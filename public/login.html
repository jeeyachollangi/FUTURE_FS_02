<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Apex CRM</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/login.css">
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="login-wrapper">
    <!-- Back to site link -->
    <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Agency Site</a>

    <!-- Blur background details -->
    <div class="glow-sphere sphere-1"></div>
    <div class="glow-sphere sphere-2"></div>

    <div class="login-card">
      <div class="card-header">
        <div class="icon-box">
          <i class="fas fa-shield-halved"></i>
        </div>
        <h2>Access Panel</h2>
        <p>Log in with administrative credentials to manage leads.</p>
      </div>

      <!-- Error message container -->
      <div id="errorBox" class="error-box hidden">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="errorMessage">Invalid credentials</span>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Admin Username</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="username" name="username" placeholder="Username" required autofocus>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" id="loginBtn" class="btn-login">
          <span>Authorize Session</span>
          <i class="fas fa-key"></i>
        </button>
      </form>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
